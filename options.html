<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitLab Search - Settings</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      max-width: 500px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input[type="url"] {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      font-size: 14px;
      background: #fc6d26;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #e24329;
    }
    #status {
      margin-top: 10px;
      color: green;
      font-size: 13px;
      min-height: 20px;
    }
    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h2>GitLab Search Settings</h2>
  <label for="gitlabUrl">GitLab URL</label>
  <input type="url" id="gitlabUrl" placeholder="https://gitlab.example.com" />
  <p class="hint">Base URL of your self-hosted GitLab (no trailing slash).</p>
  <button id="save">Save</button>
  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
